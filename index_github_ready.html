<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" name="viewport"/>
<title>InvestmentOS</title>
<meta content="#0B0E11" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="InvestmentOS" name="apple-mobile-web-app-title"/>
<link href="manifest.json" rel="manifest"/>
<link href="icon-192.png" rel="apple-touch-icon"/>
<style>
  :root{
    --bg: #0B0E11;
    --bg-elev: #12161B;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.10);
    --ink: #F2F3F5;
    --ink-dim: #8A8F98;
    --ink-faint: #5B6168;
    --gold: #D4AF37;
    --gold-soft: rgba(212,175,55,0.16);
    --green: #34C759;
    --red: #FF453A;
    --blue: #0A84FF;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  .num{ font-family: "SF Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  body{
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(212,175,55,0.10), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(10,132,255,0.08), transparent 40%),
      var(--bg);
    padding-bottom: 110px;
  }
  header.top{
    position: sticky; top:0; z-index:20;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 12px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    background: rgba(11,14,17,0.72);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header.top .brand{ font-size: 15px; font-weight: 700; letter-spacing: 0.2px; color: var(--ink); }
  header.top .brand span{ color: var(--gold); }
  header.top .date{ font-size: 12px; color: var(--ink-dim); }

  main{ padding: 18px 20px 0; max-width: 560px; margin: 0 auto; }

  .hero{
    border-radius: var(--radius-lg);
    background: linear-gradient(165deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid var(--glass-border);
    padding: 22px 20px 18px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 85% 0%, rgba(212,175,55,0.14), transparent 55%);
    pointer-events:none;
  }
  .hero .label{ font-size: 13px; color: var(--ink-dim); font-weight: 500; }
  .hero .value{ font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-top: 4px; }
  .hero .delta{ display:inline-flex; align-items:center; gap:4px; margin-top: 8px; font-size: 14px; font-weight:600; padding: 4px 10px; border-radius: 999px; }
  .delta.up{ color: var(--green); background: rgba(52,199,89,0.12); }
  .delta.down{ color: var(--red); background: rgba(255,69,58,0.12); }
  .delta.flat{ color: var(--ink-dim); background: rgba(255,255,255,0.06); }

  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .card{
    border-radius: var(--radius-md);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 14px 16px;
  }
  .card .l{ font-size: 12px; color: var(--ink-dim); display:flex; align-items:center; gap:6px; }
  .card .v{ font-size: 21px; font-weight: 700; margin-top: 4px; }
  .dot{ width:7px; height:7px; border-radius:50%; display:inline-block; }

  .section-title{
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink-dim); margin: 22px 4px 10px;
  }

  .panel{
    border-radius: var(--radius-lg);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 16px 16px 18px;
    margin-bottom: 14px;
  }

  .fx-row{ display:flex; align-items:center; justify-content:space-between; }
  .fx-coin{
    width:46px; height:46px; border-radius:50%;
    background: conic-gradient(from 180deg, var(--gold), #8a6d1e, var(--gold));
    display:flex; align-items:center; justify-content:center;
    font-size: 10px; font-weight:800; color:#1a1505;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
  }

  .bench-row{ display:flex; justify-content:space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size:14px; }
  .bench-row:last-child{ border-bottom:none; }
  .bench-row .n{ color: var(--ink-dim); }

  .chart-wrap{ position:relative; height: 120px; margin-top:6px; }

  .history-item{
    display:flex; justify-content:space-between; align-items:center;
    padding: 12px 2px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .history-item:last-child{ border-bottom:none; }
  .history-item .d{ font-size:13px; color: var(--ink-dim); }
  .history-item .nw{ font-size: 15px; font-weight:700; }
  .history-item .pieces{ font-size: 11px; color: var(--ink-faint); margin-top:2px; }
  .empty{ text-align:center; padding: 30px 10px; color: var(--ink-faint); font-size: 13px; }

  .fab{
    position: fixed; right: 20px; bottom: calc(env(safe-area-inset-bottom) + 24px);
    width: 58px; height:58px; border-radius: 50%;
    background: linear-gradient(160deg, var(--gold), #a3812a);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 30px rgba(212,175,55,0.35), 0 2px 6px rgba(0,0,0,0.4);
    border: none; cursor:pointer; z-index: 25;
  }
  .fab svg{ width:24px; height:24px; }

  /* Sheet */
  .sheet-backdrop{
    position: fixed; inset:0; background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px); opacity:0; pointer-events:none; transition: opacity .25s ease;
    z-index: 30;
  }
  .sheet-backdrop.open{ opacity:1; pointer-events:auto; }
  .sheet{
    position: fixed; left:0; right:0; bottom:0; z-index:31;
    background: var(--bg-elev);
    border-top: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px 24px 0 0;
    padding: 10px 20px calc(env(safe-area-inset-bottom) + 22px);
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    max-height: 86vh; overflow-y: auto;
  }
  .sheet.open{ transform: translateY(0); }
  .sheet .handle{ width:36px; height:5px; border-radius:3px; background: rgba(255,255,255,0.2); margin: 8px auto 14px; }
  .sheet h2{ font-size: 19px; margin: 0 0 14px; font-weight:700; }
  .field{ margin-bottom: 12px; }
  .field label{ font-size: 12px; color: var(--ink-dim); display:block; margin-bottom: 6px; font-weight:600; }
  .field input, .field textarea{
    width:100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm); padding: 12px 12px; color: var(--ink); font-size:16px;
    font-family: inherit;
  }
  .field input.num-in{ font-family:"SF Mono", ui-monospace, monospace; }
  .field textarea{ resize: vertical; min-height: 56px; }
  .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .save-btn{
    width:100%; padding: 15px; border:none; border-radius: var(--radius-sm);
    background: var(--gold); color:#1a1505; font-weight:700; font-size:16px; margin-top:8px;
    cursor:pointer;
  }
  .save-btn:active{ opacity:0.85; }
  .cancel-btn{
    width:100%; padding: 12px; border:none; border-radius: var(--radius-sm);
    background: transparent; color: var(--ink-dim); font-weight:600; font-size:14px; margin-top:6px;
  }
  .toast{
    position: fixed; left:50%; top: calc(env(safe-area-inset-top) + 60px); transform: translateX(-50%) translateY(-20px);
    background: rgba(30,33,38,0.95); border:1px solid rgba(255,255,255,0.1);
    padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight:600;
    opacity:0; transition: all .25s ease; z-index: 50; pointer-events:none;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
  ::-webkit-scrollbar{ display:none; }
  .install-note{
    font-size: 11px; color: var(--ink-faint); text-align:center; margin: 18px 0 6px; line-height:1.5;
  }
</style>
</head>
<body>
<header class="top">
<div class="brand">Investment<span>OS</span></div>
<div class="date" id="todayLabel"></div>
</header>
<main>
<div class="hero">
<div class="label">Net Worth</div>
<div class="value num" id="netWorthVal">$0.00</div>
<div class="delta flat" id="dayDelta">No prior entry</div>
</div>
<div class="grid">
<div class="card">
<div class="l"><span class="dot" style="background:var(--blue)"></span>Portfolio</div>
<div class="v num" id="portfolioVal">$0.00</div>
</div>
<div class="card">
<div class="l"><span class="dot" style="background:var(--gold)"></span>Gold</div>
<div class="v num" id="goldVal">$0.00</div>
</div>
<div class="card">
<div class="l"><span class="dot" style="background:var(--green)"></span>Cash</div>
<div class="v num" id="cashVal">$0.00</div>
</div>
<div class="card">
<div class="l"><span class="dot" style="background:var(--ink-dim)"></span>Entries</div>
<div class="v num" id="entryCount">0</div>
</div>
</div>
<div class="section-title">Markets Today</div>
<div class="panel">
<div class="fx-row">
<div>
<div class="l" style="font-size:12px;color:var(--ink-dim);">USD / THB</div>
<div class="v num" id="fxVal" style="font-size:22px;font-weight:700;">—</div>
</div>
<div class="fx-coin">฿/$</div>
</div>
<div style="margin-top:14px;">
<div class="bench-row"><span class="n">S&amp;P 500</span><span class="num" id="spVal">—</span></div>
<div class="bench-row"><span class="n">VOO</span><span class="num" id="vooVal">—</span></div>
<div class="bench-row"><span class="n">QQQ</span><span class="num" id="qqqVal">—</span></div>
</div>
</div>
<div class="section-title">Net Worth Trend</div>
<div class="panel">
<div class="chart-wrap"><svg height="120" id="trendSvg" preserveaspectratio="none" viewbox="0 0 320 120" width="100%"></svg></div>
</div>
<div class="section-title">History</div>
<div class="panel" id="historyPanel">
<div class="empty" id="emptyState">No entries yet — tap + to log today.</div>
</div>
<div class="install-note">Add to Home Screen from Safari's Share menu for the full‑screen app experience.</div>
</main>
<button aria-label="Add entry" class="fab" id="openSheetBtn">
<svg fill="none" stroke="#1a1505" stroke-linecap="round" stroke-width="2.6" viewbox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
</button>
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
<div class="handle"></div>
<h2>Daily Entry</h2>
<form id="entryForm">
<div class="field">
<label>Date</label>
<input id="f_date" required="" type="date"/>
</div>
<div class="row2">
<div class="field">
<label>Portfolio Value ($)</label>
<input class="num-in" id="f_portfolio" inputmode="decimal" placeholder="0.00" required="" step="0.01" type="number"/>
</div>
<div class="field">
<label>Gold Value ($)</label>
<input class="num-in" id="f_gold" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="row2">
<div class="field">
<label>Cash Value ($)</label>
<input class="num-in" id="f_cash" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="field">
<label>USD / THB</label>
<input class="num-in" id="f_fx" inputmode="decimal" placeholder="0.00" step="0.0001" type="number"/>
</div>
</div>
<div class="row2">
<div class="field">
<label>S&amp;P 500</label>
<input class="num-in" id="f_sp" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="field">
<label>VOO</label>
<input class="num-in" id="f_voo" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="field">
<label>QQQ</label>
<input class="num-in" id="f_qqq" inputmode="decimal" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="field">
<label>Notes</label>
<textarea id="f_notes" placeholder="Thoughts, news, decisions..."></textarea>
</div>
<button class="save-btn" type="submit">Save Entry</button>
<button class="cancel-btn" id="cancelBtn" type="button">Cancel</button>
</form>
</div>
<div class="toast" id="toast"></div>
<script>
  const STORAGE_KEY = 'investmentos_entries_v1';

  function loadEntries(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  // Append-only: entries are never overwritten, only added. Same-date re-entry
  // is stored as a new record with a timestamp; the dashboard reads the latest
  // per date but history shows every record ever saved.
  function saveEntry(entry){
    const entries = loadEntries();
    entries.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function latestPerDate(entries){
    const map = new Map();
    for(const e of entries){
      const prev = map.get(e.date);
      if(!prev || e.savedAt > prev.savedAt) map.set(e.date, e);
    }
    return Array.from(map.values()).sort((a,b)=> a.date.localeCompare(b.date));
  }

  function fmtMoney(n){
    if(n === null || n === undefined || isNaN(n)) return '—';
    return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function fmtNum(n, dp=2){
    if(n === null || n === undefined || n === '' || isNaN(n)) return '—';
    return Number(n).toLocaleString('en-US', {minimumFractionDigits:dp, maximumFractionDigits:dp});
  }

  function netWorth(e){
    return (Number(e.portfolio)||0) + (Number(e.gold)||0) + (Number(e.cash)||0);
  }

  function render(){
    const all = loadEntries();
    const series = latestPerDate(all);
    document.getElementById('entryCount').textContent = series.length;
    document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

    const emptyState = document.getElementById('emptyState');
    const historyPanel = document.getElementById('historyPanel');

    if(series.length === 0){
      document.getElementById('netWorthVal').textContent = '$0.00';
      document.getElementById('portfolioVal').textContent = '$0.00';
      document.getElementById('goldVal').textContent = '$0.00';
      document.getElementById('cashVal').textContent = '$0.00';
      document.getElementById('fxVal').textContent = '—';
      document.getElementById('spVal').textContent = '—';
      document.getElementById('vooVal').textContent = '—';
      document.getElementById('qqqVal').textContent = '—';
      document.getElementById('dayDelta').className = 'delta flat';
      document.getElementById('dayDelta').textContent = 'No prior entry';
      renderChart([]);
      historyPanel.innerHTML = '<div class="empty">No entries yet — tap + to log today.</div>';
      return;
    }

    const latest = series[series.length-1];
    const prior = series.length > 1 ? series[series.length-2] : null;
    const nw = netWorth(latest);

    document.getElementById('netWorthVal').textContent = fmtMoney(nw);
    document.getElementById('portfolioVal').textContent = fmtMoney(latest.portfolio);
    document.getElementById('goldVal').textContent = fmtMoney(latest.gold);
    document.getElementById('cashVal').textContent = fmtMoney(latest.cash);
    document.getElementById('fxVal').textContent = latest.fx ? fmtNum(latest.fx, 2) : '—';
    document.getElementById('spVal').textContent = latest.sp ? fmtNum(latest.sp,2) : '—';
    document.getElementById('vooVal').textContent = latest.voo ? fmtNum(latest.voo,2) : '—';
    document.getElementById('qqqVal').textContent = latest.qqq ? fmtNum(latest.qqq,2) : '—';

    const deltaEl = document.getElementById('dayDelta');
    if(prior){
      const priorNw = netWorth(prior);
      const diff = nw - priorNw;
      const pct = priorNw !== 0 ? (diff/priorNw*100) : 0;
      const sign = diff > 0 ? '+' : (diff < 0 ? '' : '');
      deltaEl.className = 'delta ' + (diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat');
      deltaEl.textContent = `${sign}${fmtMoney(diff)} (${sign}${pct.toFixed(2)}%) since ${prior.date}`;
    } else {
      deltaEl.className = 'delta flat';
      deltaEl.textContent = 'First entry logged';
    }

    renderChart(series);

    // history, most recent first
    const rev = [...series].reverse();
    historyPanel.innerHTML = rev.map(e => {
      const v = netWorth(e);
      return `<div class="history-item">
        <div>
          <div class="d">${e.date}</div>
          <div class="pieces">P ${fmtMoney(e.portfolio)} · G ${fmtMoney(e.gold)} · C ${fmtMoney(e.cash)}</div>
        </div>
        <div class="nw num">${fmtMoney(v)}</div>
      </div>`;
    }).join('');
  }

  function renderChart(series){
    const svg = document.getElementById('trendSvg');
    if(series.length < 2){
      svg.innerHTML = series.length===1
        ? `<text x="160" y="62" fill="#5B6168" font-size="11" text-anchor="middle" font-family="-apple-system">One entry — trend appears after day two</text>`
        : `<text x="160" y="62" fill="#5B6168" font-size="11" text-anchor="middle" font-family="-apple-system">No data yet</text>`;
      return;
    }
    const W = 320, H = 120, PAD = 8;
    const vals = series.map(netWorth);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const stepX = (W - PAD*2) / (vals.length - 1);
    const pts = vals.map((v,i) => {
      const x = PAD + i*stepX;
      const y = H - PAD - ((v - min)/range) * (H - PAD*2);
      return [x,y];
    });
    const linePath = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');
    const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(2)},${H} L${pts[0][0].toFixed(2)},${H} Z`;
    const up = vals[vals.length-1] >= vals[0];
    const stroke = up ? '#34C759' : '#FF453A';
    svg.innerHTML = `
      <defs>
        <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${stroke}" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="${stroke}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#fillGrad)" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="3.2" fill="${stroke}"/>
    `;
  }

  // Sheet open/close
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('backdrop');
  function openSheet(){
    document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
    sheet.classList.add('open');
    backdrop.classList.add('open');
  }
  function closeSheet(){
    sheet.classList.remove('open');
    backdrop.classList.remove('open');
  }
  document.getElementById('openSheetBtn').addEventListener('click', openSheet);
  document.getElementById('cancelBtn').addEventListener('click', closeSheet);
  backdrop.addEventListener('click', closeSheet);

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1800);
  }

  document.getElementById('entryForm').addEventListener('submit', function(ev){
    ev.preventDefault();
    const entry = {
      date: document.getElementById('f_date').value,
      portfolio: document.getElementById('f_portfolio').value,
      gold: document.getElementById('f_gold').value,
      cash: document.getElementById('f_cash').value,
      fx: document.getElementById('f_fx').value,
      sp: document.getElementById('f_sp').value,
      voo: document.getElementById('f_voo').value,
      qqq: document.getElementById('f_qqq').value,
      notes: document.getElementById('f_notes').value,
      savedAt: Date.now()
    };
    saveEntry(entry);
    closeSheet();
    showToast('Entry saved');
    this.reset();
    render();
  });

  render();

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
